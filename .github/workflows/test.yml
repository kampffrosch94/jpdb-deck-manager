name: "Test"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: cachix/install-nix-action@v20
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - run: |
        git config user.email "pages@github.com"
        git config user.name "Github P Pages"
        nix develop --command bash -c "npm install && npm run gh-pages"
